<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      width: 320px; 
      padding: 15px; 
      margin: 0;
    }
    textarea { 
      width: 100%; 
      height: 120px; 
      margin-bottom: 10px; 
      box-sizing: border-box;
      resize: vertical;
    }
    .opcoes {
      margin-bottom: 15px;
      font-size: 0.9em;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    button { 
      width: 100%; 
      padding: 10px; 
      cursor: pointer; 
      background: #005A9C; 
      color: white; 
      border: none; 
      border-radius: 4px;
      font-weight: bold;
    }
    button:hover { background: #003B6F; }
    #status { 
      margin-top: 10px; 
      font-size: 0.9em; 
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h4>Lançador de Notas - SAV</h4>
  <p style="font-size: 0.8em; color: #555;">Cole as notas no formato RA&Nota; (Ex: 151184&10.0;)</p>
  
  <textarea id="notasInput" placeholder="149079&10.0;&#10;149069&0,0;"></textarea>
  
  <div class="opcoes">
    <input type="checkbox" id="chkNC" checked>
    <label for="chkNC">Marcar N/C para notas 0,0</label>
  </div>

  <button id="btnProcessar">Injetar Notas na Tabela</button>
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
