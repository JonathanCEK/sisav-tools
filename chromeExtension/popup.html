<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      width: 320px; 
      padding: 15px; 
      margin: 0;
    }
    .abas {
      display: flex;
      margin-bottom: 15px;
      border-bottom: 2px solid #ddd;
    }
    .abas input[type="radio"] { display: none; }
    .abas label {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      cursor: pointer;
      font-size: 0.9em;
      font-weight: bold;
      color: #777;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .abas label:hover { color: #005A9C; }
    .abas input[type="radio"]:checked + label {
      color: #005A9C;
      border-bottom: 2px solid #005A9C;
    }

    textarea { 
      width: 100%; 
      height: 120px; 
      margin-bottom: 10px; 
      box-sizing: border-box;
      resize: vertical;
    }
    .opcoes {
      margin-bottom: 15px;
      font-size: 0.9em;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    button { 
      width: 100%; 
      padding: 10px; 
      cursor: pointer; 
      background: #005A9C; 
      color: white; 
      border: none; 
      border-radius: 4px;
      font-weight: bold;
    }
    button:hover { background: #003B6F; }
    #status { 
      margin-top: 10px; 
      font-size: 0.9em; 
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  
  <div class="abas">
    <input type="radio" id="abaNotas" name="modo" value="notas" checked>
    <label for="abaNotas">Lançar Notas</label>
    
    <input type="radio" id="abaFaltas" name="modo" value="faltas">
    <label for="abaFaltas">Lançar Faltas</label>
  </div>

  <p id="hintTexto" style="font-size: 0.8em; color: #555; margin-top: 0;">Formato: RA&Nota;</p>
  
  <textarea id="dadosInput" placeholder="149079&10.0;&#10;149069&0,0;"></textarea>
  
  <div class="opcoes" id="opcoesNotas">
    <input type="checkbox" id="chkNC" checked>
    <label for="chkNC">Marcar N/C para notas 0,0</label>
  </div>

  <button id="btnProcessar">Injetar Notas na Tabela</button>
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
